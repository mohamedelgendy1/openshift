apiVersion: v1beta1
kind: AgentConfig
metadata:
 name: 
rendezvousIP:
additionalNTPSources:
  - 
  - 

hosts:
 - hostname: 
   role: master
   rootDeviceHints:
     deviceName: "/dev/sdb"
   interfaces:
   - name: #name of interface-1 from Live ISO
     macAddress: #mac address-1
   - name: #name of interface-2 from Live ISO
     macAddress: #mac address-2
   networkConfig:
      interfaces:
        - name: bond0.(#vlan id)
          type: vlan
          state: up
          vlan:
            base-iface: bond0
            id: #get it from the Live ISO or provided by customer
          ipv4:
            enabled: true
            address:
              - ip: 10.51.201.20
                prefix-length: 24
            dhcp: false
        - name: bond0
          type: bond
          state: up
          ipv4:
            enabled: false
          ipv6:
            enabled: false
          link-aggregation:
            mode: "active-active"
            options:
              miimon: "150"
            port:
              - #interface-1
              - #interface-2
      dns-resolver:
        config:
          server:
                - #from customer
                - #from customer
      routes:
          config:
            - destination: 0.0.0.0/0
              next-hop-address: #from customer
              next-hop-interface: bond0
              table-id: #from customer


